version: "3.8"

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=preifma_db
      - POSTGRES_USER=preifma_user
      - POSTGRES_PASSWORD=admin123
    ports:
      - "5432:5432"
